<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Фиолетовый фон с градиентом -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="48" height="48" rx="12" fill="url(#bgGradient)"/>
  
  <!-- Мозги -->
  <g filter="url(#glow)">
    <!-- Левое полушарие -->
    <path d="M 18 24 C 18 18 20 14 24 14 C 22 14 20 16 20 18 C 20 16 22 14 24 14 C 24 12 26 10 28 12 C 26 12 24 14 24 16 L 24 28 C 24 30 22 32 20 32 C 18 32 16 30 16 28 C 16 26 17 24 18 24 Z" 
          fill="url(#brainGradient)" opacity="0.9"/>
    
    <!-- Правое полушарие -->
    <path d="M 30 24 C 30 18 28 14 24 14 C 26 14 28 16 28 18 C 28 16 26 14 24 14 C 24 12 22 10 20 12 C 22 12 24 14 24 16 L 24 28 C 24 30 26 32 28 32 C 30 32 32 30 32 28 C 32 26 31 24 30 24 Z" 
          fill="url(#brainGradient)" opacity="0.9"/>
    
    <!-- Центральная часть -->
    <ellipse cx="24" cy="22" rx="3" ry="8" fill="url(#brainGradient)" opacity="0.8"/>
    
    <!-- Детали мозга -->
    <path d="M 20 18 Q 22 20 20 22" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 28 18 Q 26 20 28 22" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 22 26 Q 24 28 26 26" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>
</svg>
